{{- if .Values.rbac.helpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "cloudnative-mysql.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "cloudnative-mysql.resourceName" (dict "suffix" "database-viewer-role" "context" $) }}
rules:
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - databases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - databases/status
  verbs:
  - get
{{- end }}
