{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- if .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "cloudnative-mysql.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  name: {{ include "cloudnative-mysql.resourceName" (dict "suffix" "validating-webhook-configuration" "context" $) }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "cloudnative-mysql.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-mysql-cloudnative-mysql-io-v1alpha1-cluster-status
  failurePolicy: Fail
  name: vclusterstatus-v1alpha1.cloudnative-mysql.io
  rules:
  - apiGroups:
    - mysql.cloudnative-mysql.io
    apiVersions:
    - v1alpha1
    operations:
    - UPDATE
    resources:
    - clusters/status
  sideEffects: None
  {{- if .Values.rbac.namespaced }}
  namespaceSelector:
    matchLabels:
      "kubernetes.io/metadata.name": {{ .Release.Namespace | quote }}
  {{- end }}
{{- end }}
