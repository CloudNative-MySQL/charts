name: Release Helm chart

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f128fff7bf081919f2f583515 # v4.3.6

      - name: Lint chart (cluster-wide mode)
        run: helm lint ./charts/cloudnative-mysql

      - name: Lint chart (namespaced mode)
        run: helm lint ./charts/cloudnative-mysql --set rbac.namespaced=true

      - name: Template chart in both modes
        run: |
          helm template cnmysql ./charts/cloudnative-mysql --namespace cnmysql-system > /tmp/cluster-wide.yaml
          helm template cnmysql ./charts/cloudnative-mysql --namespace cnmysql-system --set rbac.namespaced=true > /tmp/namespaced.yaml

  push:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f128fff7bf081919f2f583515 # v4.3.6

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push chart to OCI
        run: |
          CHART_DIR="./charts/cloudnative-mysql"
          helm lint "$CHART_DIR"
          helm package "$CHART_DIR" --destination .

          PKG=$(ls cloudnative-mysql-*.tgz | head -n 1)
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "Pushing ${PKG} to oci://ghcr.io/${OWNER_LOWER}/charts"
          helm push "$PKG" "oci://ghcr.io/${OWNER_LOWER}/charts"
