name: Release Helm chart

on:
  push:
    tags:
    - cnmsql-v*
  workflow_dispatch:


permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Set up Helm
      uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

    - name: Lint chart (cluster-wide mode)
      run: helm lint ./charts/cnmsql

    - name: Lint chart (namespaced mode)
      run: helm lint ./charts/cnmsql --set rbac.namespaced=true

    - name: Template chart in both modes
      run: |
        helm template cnmsql ./charts/cnmsql --namespace cnmsql-system > /tmp/cluster-wide.yaml
        helm template cnmsql ./charts/cnmsql --namespace cnmsql-system --set rbac.namespaced=true > /tmp/namespaced.yaml

  push:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Set up Helm
      uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

    - name: Log in to GitHub Container Registry
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

    - name: Package and push chart to OCI
      run: |
        CHART_DIR="./charts/cnmsql"
        helm lint "$CHART_DIR"
        helm package "$CHART_DIR" --destination .

        PKG=$(ls cnmsql-*.tgz | head -n 1)
        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

        echo "Pushing ${PKG} to oci://ghcr.io/${OWNER_LOWER}/charts"
        helm push "$PKG" "oci://ghcr.io/${OWNER_LOWER}/charts"
